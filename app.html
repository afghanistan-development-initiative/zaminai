<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZaminAI — Smart Farming Intelligence</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<style>
  :root {
    --green: #16a34a; --green-light: #bbf7d0; --green-dark: #14532d;
    --amber: #d97706; --red: #dc2626; --blue: #0284c7;
    --bg: #f0fdf4; --card: #ffffff; --border: #d1fae5;
    --text: #1a2e1a; --muted: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

  /* ── HEADER ── */
  #header {
    background: var(--green-dark); color: #fff;
    padding: 10px 16px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px; flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,.3); z-index: 1000; position: relative;
  }
  #header .logo { font-size: 1.3rem; font-weight: 700; letter-spacing: -.5px; }
  #header .logo span { color: #86efac; }
  .lang-btns button {
    background: transparent; border: 1px solid #86efac;
    color: #86efac; border-radius: 4px; padding: 3px 9px;
    font-size: .8rem; cursor: pointer; margin-left: 4px;
  }
  .lang-btns button.active { background: #86efac; color: var(--green-dark); font-weight: 700; }

  /* ── TOOLBAR ── */
  #toolbar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 8px 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .btn {
    border: none; border-radius: 6px; padding: 7px 14px;
    font-size: .85rem; font-weight: 600; cursor: pointer; display: flex;
    align-items: center; gap: 5px; transition: all .15s;
  }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: #15803d; }
  .btn-secondary { background: #f0fdf4; color: var(--green-dark); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--green-light); }
  .btn-danger { background: #fee2e2; color: var(--red); border: 1px solid #fca5a5; }
  .btn-danger:hover { background: #fca5a5; }
  .btn-analyse { background: #0f766e; color: #fff; }
  .btn-analyse:hover { background: #0d5f58; }
  .field-count {
    margin-left: auto; background: var(--green-light);
    color: var(--green-dark); border-radius: 20px;
    padding: 4px 12px; font-size: .8rem; font-weight: 700;
  }

  /* ── MAIN LAYOUT ── */
  #main { display: flex; height: calc(100vh - 100px); }
  #map { flex: 1; min-width: 0; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 360px; min-width: 300px; background: #fff;
    border-left: 1px solid var(--border); overflow-y: auto;
    display: flex; flex-direction: column;
  }

  /* ── FIELDS LIST ── */
  #fields-panel { padding: 12px; border-bottom: 2px solid var(--border); }
  .fields-header {
    font-weight: 700; color: var(--green-dark);
    font-size: .9rem; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .field-item {
    border: 2px solid var(--border); border-radius: 8px;
    padding: 10px; margin-bottom: 8px; cursor: pointer;
    transition: all .15s; position: relative;
  }
  .field-item:hover { border-color: var(--green); background: #f0fdf4; }
  .field-item.active { border-color: var(--green); background: #f0fdf4; box-shadow: 0 0 0 3px #bbf7d0; }
  .field-item .fi-name {
    font-weight: 700; font-size: .9rem; color: var(--green-dark);
    display: flex; align-items: center; gap: 6px;
  }
  .field-item .fi-meta { font-size: .78rem; color: var(--muted); margin-top: 3px; }
  .field-item .fi-ndvi {
    position: absolute; top: 10px; right: 10px;
    font-size: .85rem; font-weight: 700; padding: 2px 8px;
    border-radius: 12px;
  }
  .ndvi-good { background: #dcfce7; color: var(--green-dark); }
  .ndvi-mod  { background: #fef9c3; color: #92400e; }
  .ndvi-poor { background: #fee2e2; color: var(--red); }
  .field-del {
    position: absolute; bottom: 8px; right: 8px;
    background: #fee2e2; color: var(--red); border: none;
    border-radius: 4px; padding: 2px 7px; font-size: .75rem;
    cursor: pointer;
  }
  .field-del:hover { background: #fca5a5; }

  /* ── REPORT ── */
  #report-panel { flex: 1; padding: 12px; }
  .report-placeholder {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 200px; color: var(--muted);
    text-align: center; gap: 10px;
  }
  .report-placeholder .ph-icon { font-size: 2.5rem; }

  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
  .metric-card {
    background: var(--bg); border-radius: 8px; padding: 10px;
    border: 1px solid var(--border); text-align: center;
  }
  .metric-card .mc-val { font-size: 1.2rem; font-weight: 700; color: var(--green-dark); }
  .metric-card .mc-lbl { font-size: .72rem; color: var(--muted); margin-top: 2px; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px; font-weight: 700;
    font-size: .85rem; margin-bottom: 10px;
  }
  .status-good  { background: #dcfce7; color: var(--green-dark); }
  .status-mod   { background: #fef9c3; color: #92400e; }
  .status-poor  { background: #fee2e2; color: var(--red); }

  /* Mini satellite map in report */
  #mini-map { height: 140px; border-radius: 8px; overflow: hidden; margin: 8px 0; border: 2px solid var(--border); }

  /* NDVI trend bars */
  .trend-bars { display: flex; gap: 3px; align-items: flex-end; height: 50px; margin: 8px 0; }
  .trend-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .trend-bar { width: 100%; border-radius: 3px 3px 0 0; transition: height .4s; min-height: 4px; }
  .trend-year { font-size: .62rem; color: var(--muted); }

  .actions-list { margin: 8px 0; }
  .action-item {
    border-radius: 6px; padding: 8px 10px;
    margin-bottom: 6px; font-size: .82rem; line-height: 1.4;
  }
  .act-urgent   { background: #fee2e2; border-left: 3px solid var(--red); }
  .act-warn     { background: #fef9c3; border-left: 3px solid var(--amber); }
  .act-ok       { background: #dcfce7; border-left: 3px solid var(--green); }

  .crops-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
  .crop-chip {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px; font-size: .78rem;
    color: var(--green-dark); font-weight: 600;
  }

  /* Multi-field comparison */
  #compare-panel { padding: 12px; border-top: 2px solid var(--border); display: none; }
  .compare-header { font-weight: 700; color: var(--green-dark); font-size: .9rem; margin-bottom: 8px; }
  .compare-table { width: 100%; border-collapse: collapse; font-size: .78rem; }
  .compare-table th { background: var(--green-dark); color: #fff; padding: 5px 8px; text-align: left; }
  .compare-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); }
  .compare-table tr:hover td { background: var(--bg); }

  /* ── AI CHAT ── */
  #ai-panel {
    border-top: 2px solid var(--border); padding: 12px;
    display: flex; flex-direction: column; gap: 8px; max-height: 320px;
  }
  .ai-header { font-weight: 700; color: var(--green-dark); font-size: .88rem; display: flex; align-items: center; gap: 6px; }
  #ai-messages {
    flex: 1; overflow-y: auto; max-height: 160px;
    background: var(--bg); border-radius: 8px; padding: 8px;
    border: 1px solid var(--border); font-size: .82rem; line-height: 1.5;
  }
  .msg { margin-bottom: 6px; padding: 6px 8px; border-radius: 6px; }
  .msg-user { background: var(--green-light); color: var(--green-dark); text-align: right; }
  .msg-ai   { background: #f8fafc; color: var(--text); }
  .msg-sys  { color: var(--muted); font-style: italic; font-size: .78rem; text-align: center; }

  .quick-btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .quick-btn {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 9px; font-size: .75rem;
    cursor: pointer; color: var(--green-dark); transition: .12s;
  }
  .quick-btn:hover { background: var(--green-light); border-color: var(--green); }

  #ai-input-row { display: flex; gap: 6px; }
  #ai-input {
    flex: 1; border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 10px; font-size: .82rem; outline: none;
  }
  #ai-input:focus { border-color: var(--green); }
  #mic-btn {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 10px; cursor: pointer; font-size: 1rem;
  }
  #mic-btn.listening { background: #fee2e2; border-color: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  #send-btn { background: var(--green); color: #fff; border: none; border-radius: 6px; padding: 7px 14px; cursor: pointer; font-size: .82rem; font-weight: 600; }

  /* ── LOADING OVERLAY ── */
  #loading {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
    z-index: 9999; align-items: center; justify-content: center;
  }
  #loading.show { display: flex; }
  .loading-box {
    background: #fff; border-radius: 12px; padding: 24px 32px;
    text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,.3);
  }
  .spinner {
    width: 44px; height: 44px; border: 4px solid var(--border);
    border-top-color: var(--green); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    #main { flex-direction: column; height: auto; }
    #map { height: 55vw; min-height: 220px; }
    #sidebar { width: 100%; max-height: 60vh; overflow-y: auto; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="logo">🌱 Zamin<span>AI</span></div>
  <div class="lang-btns">
    <button class="active" onclick="setLang('en')">EN</button>
    <button onclick="setLang('fa')">دری</button>
    <button onclick="setLang('ps')">پښتو</button>
  </div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="btn btn-primary" id="btn-draw" onclick="startDraw()">✏️ <span data-t="draw">Draw Field</span></button>
  <button class="btn btn-secondary" id="btn-gps" onclick="useGPS()">📍 <span data-t="gps">GPS</span></button>
  <button class="btn btn-secondary" id="btn-map-toggle" onclick="toggleMapType()">🗺️ <span data-t="map_toggle">Satellite</span></button>
  <button class="btn btn-danger" id="btn-clear-last" onclick="clearLastField()">✕ <span data-t="clear_last">Remove Last</span></button>
  <button class="btn btn-danger" id="btn-clear-all" onclick="clearAllFields()">🗑️ <span data-t="clear_all">Clear All</span></button>
  <button class="btn btn-analyse" id="btn-analyse" onclick="analyseAll()">🛰️ <span data-t="analyse">Analyse All</span></button>
  <div class="field-count" id="field-count">0 <span data-t="fields">fields</span></div>
</div>

<!-- LOADING -->
<div id="loading"><div class="loading-box">
  <div class="spinner"></div>
  <div id="loading-text" style="color:#16a34a;font-weight:700">Analysing with satellite…</div>
</div></div>

<!-- MAIN -->
<div id="main">
  <div id="map"></div>
  <div id="sidebar">

    <!-- FIELDS LIST -->
    <div id="fields-panel">
      <div class="fields-header">📋 <span data-t="your_fields">Your Fields</span></div>
      <div id="fields-list">
        <div class="report-placeholder">
          <div class="ph-icon">✏️</div>
          <div data-t="draw_hint">Draw fields on the map to start analysis</div>
        </div>
      </div>
    </div>

    <!-- REPORT -->
    <div id="report-panel">
      <div id="report-content">
        <div class="report-placeholder">
          <div class="ph-icon">🛰️</div>
          <div data-t="report_hint">Select a field to see its satellite report</div>
        </div>
      </div>
    </div>

    <!-- COMPARISON TABLE (shown when >1 field) -->
    <div id="compare-panel">
      <div class="compare-header">📊 <span data-t="compare">Field Comparison</span></div>
      <table class="compare-table">
        <thead><tr>
          <th data-t="field">Field</th>
          <th>NDVI</th>
          <th data-t="water">Water</th>
          <th data-t="area">Area</th>
          <th data-t="status">Status</th>
        </tr></thead>
        <tbody id="compare-body"></tbody>
      </table>
    </div>

    <!-- AI CHAT -->
    <div id="ai-panel">
      <div class="ai-header">🤖 <span data-t="ai_title">Ask AI Assistant</span>
        <span id="ai-status" style="font-size:.72rem;color:#6b7280;font-weight:400"></span>
      </div>
      <div class="quick-btns" id="quick-btns"></div>
      <div id="ai-messages">
        <div class="msg msg-sys" data-t="ai_welcome">Draw a field and ask me anything about water, crops, or soil.</div>
      </div>
      <div id="ai-input-row">
        <button id="mic-btn" onclick="toggleVoice()">🎤</button>
        <input id="ai-input" type="text" placeholder="Ask in any language…" onkeydown="if(event.key==='Enter')sendQuestion()">
        <button id="send-btn" onclick="sendQuestion()">→</button>
      </div>
    </div>

  </div><!-- /sidebar -->
</div><!-- /main -->

<script>
// ════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════
const API = "https://zaminai.onrender.com";   // ← your Render URL

// ════════════════════════════════════════════════════════════
// TRANSLATIONS
// ════════════════════════════════════════════════════════════
const TRANS = {
  en: {
    draw:"Draw Field", gps:"GPS Locate", map_toggle:"Satellite",
    clear_last:"Remove Last", clear_all:"Clear All", analyse:"Analyse All",
    fields:"fields", your_fields:"Your Fields",
    draw_hint:"Draw fields on the map to start analysis",
    report_hint:"Select a field to see its satellite report",
    compare:"Field Comparison", field:"Field", water:"Water",
    area:"Area (ha)", status:"Status",
    ai_title:"Ask AI Assistant", ai_welcome:"Draw a field and ask me anything.",
    loading:"Analysing satellite data…",
    quick: ["💧 Irrigation?","🌾 Best crop?","💰 Profit?","🌱 Fertilizer?","📈 Recovery?"],
    vegetation:"Vegetation", water_idx:"Water Index", rainfall:"Rainfall",
    actions:"What to Do", best_crops:"Best Crops", income:"Income Est.",
    ndvi_trend:"NDVI Trend", data_date:"Data Date",
    field_size:"Field Size", province:"Province",
    urgent:"URGENT", important:"IMPORTANT", recommended:"RECOMMENDED",
    source_live:"Live satellite data", source_reg:"Regional estimate"
  },
  fa: {
    draw:"رسم زمین", gps:"موقعیت GPS", map_toggle:"ماهواره",
    clear_last:"حذف آخری", clear_all:"پاک کردن همه", analyse:"تحلیل همه",
    fields:"زمین", your_fields:"زمین‌های شما",
    draw_hint:"زمین را روی نقشه رسم کنید تا تحلیل شروع شود",
    report_hint:"یک زمین را انتخاب کنید تا گزارش ماهواره‌ای آن را ببینید",
    compare:"مقایسه زمین‌ها", field:"زمین", water:"آب",
    area:"مساحت (هکتار)", status:"وضعیت",
    ai_title:"دستیار هوش مصنوعی", ai_welcome:"زمین رسم کنید و هر سوالی بپرسید.",
    loading:"در حال تحلیل داده‌های ماهواره…",
    quick: ["💧 آبیاری؟","🌾 بهترین محصول؟","💰 فایده؟","🌱 کود؟","📈 بهبود؟"],
    vegetation:"پوشش گیاهی", water_idx:"شاخص آب", rainfall:"بارندگی",
    actions:"چه باید کرد", best_crops:"بهترین محصولات", income:"برآورد درآمد",
    ndvi_trend:"روند NDVI", data_date:"تاریخ داده",
    field_size:"اندازه زمین", province:"ولایت",
    urgent:"فوری", important:"مهم", recommended:"توصیه شده",
    source_live:"داده‌های ماهواره‌ای زنده", source_reg:"تخمین منطقه‌ای"
  },
  ps: {
    draw:"د ځمکې رسم", gps:"GPS موقعیت", map_toggle:"سیاره‌ای",
    clear_last:"وروستی لرې کړه", clear_all:"ټول پاک کړه", analyse:"ټول تحلیل",
    fields:"ځمکه", your_fields:"ستاسو ځمکې",
    draw_hint:"د تحلیل پیل لپاره ځمکه پر نقشه رسم کړه",
    report_hint:"د ماهواره راپور لیدلو لپاره یوه ځمکه وټاکئ",
    compare:"د ځمکو پرتله", field:"ځمکه", water:"اوبه",
    area:"مساحت (هکتار)", status:"حالت",
    ai_title:"د AI مرستیال", ai_welcome:"ځمکه رسم کړه او هر پوښتنه وکړه.",
    loading:"د ماهواره معلوماتو تحلیل…",
    quick: ["💧 اوبه ورکول؟","🌾 غوره محصول؟","💰 ګټه؟","🌱 سره؟","📈 بهتریدل؟"],
    vegetation:"د نباتاتو پوښ", water_idx:"د اوبو شاخص", rainfall:"باران",
    actions:"څه وکړي", best_crops:"غوره محصولات", income:"د عاید اټکل",
    ndvi_trend:"د NDVI رجحان", data_date:"د معلوماتو نیټه",
    field_size:"د ځمکې اندازه", province:"ولایت",
    urgent:"بیړني", important:"مهم", recommended:"سپارښتنه شوی",
    source_live:"ژوندی د ماهواره معلومات", source_reg:"سیمه‌ییزه اټکل"
  }
};

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let lang = "en";
let fields = [];          // [{id, label, coords, layer, data, color}]
let activeFieldId = null;
let drawMode = false;
let currentPoints = [];
let tempMarkers = [];
let tempPoly = null;
let miniMap = null;
let isSatellite = false;
let isListening = false;

// Field colours — distinguishable on map
const FIELD_COLORS = ["#16a34a","#0284c7","#d97706","#dc2626","#7c3aed","#0891b2","#be185d","#65a30d"];

// ════════════════════════════════════════════════════════════
// MAP INIT
// ════════════════════════════════════════════════════════════
const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution:"© OpenStreetMap", maxZoom:19
});
const sat = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { attribution:"© Esri", maxZoom:19 }
);
const labels = L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { attribution:"", maxZoom:19, opacity:0.6 }
);

const map = L.map("map", {
  center: [33.9, 67.7], zoom: 6, layers: [osm]
});

function toggleMapType() {
  isSatellite = !isSatellite;
  if (isSatellite) {
    map.removeLayer(osm);
    map.addLayer(sat);
    map.addLayer(labels);
    document.querySelector("#btn-map-toggle span").textContent = T("map_toggle_back") || "Street Map";
  } else {
    map.removeLayer(sat);
    map.removeLayer(labels);
    map.addLayer(osm);
    document.querySelector("#btn-map-toggle span").textContent = T("map_toggle") || "Satellite";
  }
}

// Click handler for drawing
map.on("click", function(e) {
  if (!drawMode) return;
  const { lat, lng } = e.latlng;
  currentPoints.push([lat, lng]);
  const m = L.circleMarker([lat, lng], { radius: 5, color: "#16a34a", fillColor: "#16a34a", fillOpacity: 1 }).addTo(map);
  tempMarkers.push(m);
  if (tempPoly) map.removeLayer(tempPoly);
  if (currentPoints.length >= 2) {
    tempPoly = L.polygon(currentPoints, { color: "#16a34a", fillOpacity: 0.15, dashArray: "6,4" }).addTo(map);
  }
});

// Double-click to finish field
map.on("dblclick", function(e) {
  if (!drawMode || currentPoints.length < 3) return;
  finishField();
  L.DomEvent.stop(e);
});

// ════════════════════════════════════════════════════════════
// DRAWING
// ════════════════════════════════════════════════════════════
function startDraw() {
  drawMode = true;
  currentPoints = [];
  tempMarkers.forEach(m => map.removeLayer(m)); tempMarkers = [];
  if (tempPoly) { map.removeLayer(tempPoly); tempPoly = null; }
  map.getContainer().style.cursor = "crosshair";
  showToast(lang === "fa" ? "روی نقشه کلیک کنید — دوبار کلیک برای پایان" :
            lang === "ps" ? "نقشه کلیک وکړه — د پای لپاره دوه‌ ځله کلیک" :
            "Click map to draw • Double-click to finish");
}

function finishField() {
  drawMode = false;
  map.getContainer().style.cursor = "";
  if (currentPoints.length < 3) { showToast("Need at least 3 points"); return; }

  tempMarkers.forEach(m => map.removeLayer(m)); tempMarkers = [];
  if (tempPoly) { map.removeLayer(tempPoly); tempPoly = null; }

  const id = Date.now();
  const idx = fields.length;
  const color = FIELD_COLORS[idx % FIELD_COLORS.length];
  const label = `Field ${idx + 1}`;

  const layer = L.polygon(currentPoints, {
    color, weight: 3, fillOpacity: 0.2
  }).addTo(map).bindTooltip(label, { permanent: true, direction: "center", className: "field-label-tooltip" });

  layer.on("click", () => selectField(id));

  const field = { id, label, coords: [...currentPoints], layer, color, data: null };
  fields.push(field);
  currentPoints = [];

  updateFieldCount();
  updateFieldsList();
  selectField(id);
  showToast(lang === "fa" ? `${label} اضافه شد` : lang === "ps" ? `${label} اضافه شو` : `${label} added — click Analyse All`);
}

function clearLastField() {
  if (fields.length === 0) return;
  const f = fields.pop();
  if (f.layer) map.removeLayer(f.layer);
  if (activeFieldId === f.id) activeFieldId = null;
  updateFieldCount();
  updateFieldsList();
  updateReport(null);
  updateComparison();
}

function clearAllFields() {
  fields.forEach(f => { if (f.layer) map.removeLayer(f.layer); });
  fields = []; activeFieldId = null;
  updateFieldCount();
  updateFieldsList();
  updateReport(null);
  updateComparison();
  if (miniMap) { miniMap.remove(); miniMap = null; }
}

function selectField(id) {
  activeFieldId = id;
  // Highlight on map
  fields.forEach(f => {
    if (f.layer) f.layer.setStyle({ weight: f.id === id ? 4 : 2, fillOpacity: f.id === id ? 0.35 : 0.15 });
  });
  // Update list highlight
  document.querySelectorAll(".field-item").forEach(el => {
    el.classList.toggle("active", el.dataset.id == id);
  });
  const field = fields.find(f => f.id === id);
  if (field && field.data) {
    renderReport(field);
    map.fitBounds(field.layer.getBounds(), { padding: [20, 20] });
  } else if (field) {
    updateReport(null);
  }
}

// ════════════════════════════════════════════════════════════
// GPS
// ════════════════════════════════════════════════════════════
function useGPS() {
  if (!navigator.geolocation) { showToast("GPS not available"); return; }
  showToast(lang === "fa" ? "موقعیت در حال دریافت…" : "Getting your location…");
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    map.setView([lat, lng], 14);
    showToast(lang === "fa" ? "موقعیت یافت — حالا زمین رسم کنید" :
              lang === "ps" ? "موقعیت وموندل شو — اوس ځمکه رسم کړه" :
              "Location found — now draw your field");
    startDraw();
  }, () => showToast("GPS error — please draw manually"));
}

// ════════════════════════════════════════════════════════════
// ANALYSE ALL FIELDS
// ════════════════════════════════════════════════════════════
async function analyseAll() {
  if (fields.length === 0) { showToast("Draw at least one field first"); return; }

  showLoading(true);
  const unanalysed = fields.filter(f => !f.data);
  const toAnalyse  = unanalysed.length > 0 ? unanalysed : fields;

  for (const field of toAnalyse) {
    try {
      const res = await fetch(`${API}/analyse`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ coords: field.coords, year: 2024, label: field.label })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      field.data = await res.json();
    } catch (e) {
      console.error("Analyse error:", e);
      field.data = buildFallback(field);
    }
    updateNDVIBadge(field);
  }

  showLoading(false);
  updateFieldsList();
  updateComparison();

  // Show first/active field report
  const target = fields.find(f => f.id === activeFieldId) || fields[0];
  if (target) { selectField(target.id); renderReport(target); }
}

function buildFallback(field) {
  const lats = field.coords.map(c => c[0]);
  const lons = field.coords.map(c => c[1]);
  const clat = lats.reduce((a,b)=>a+b,0)/lats.length;
  const clon = lons.reduce((a,b)=>a+b,0)/lons.length;
  // Rough area
  let area = 0;
  const n = field.coords.length;
  for (let i=0; i<n; i++) {
    const j=(i+1)%n;
    area += field.coords[i][1]*field.coords[j][0];
    area -= field.coords[j][1]*field.coords[i][0];
  }
  const area_ha = Math.round(Math.abs(area)/2*111320**2/10000*100)/100;
  return {
    ndvi: 0.155, water: -0.19, rain: 240,
    area_ha, area_jereb: Math.round(area_ha*5*10)/10,
    province: "Afghanistan",
    trend: {2019:0.172,2020:0.168,2021:0.162,2022:0.139,2023:0.142,2024:0.152},
    latest_date: "2024-05-15", source: "regional_database"
  };
}

// ════════════════════════════════════════════════════════════
// RENDER REPORT
// ════════════════════════════════════════════════════════════
function renderReport(field) {
  const d = field.data;
  if (!d) { updateReport(null); return; }

  const ndvi = parseFloat(d.ndvi) || 0;
  const water = parseFloat(d.water) || 0;
  const rain = parseFloat(d.rain) || 0;
  const areaHa = parseFloat(d.area_ha) || 0;
  const areaJ  = parseFloat(d.area_jereb) || Math.round(areaHa*5*10)/10;

  // Status
  let statusClass = "status-good", statusText = "🟢 GOOD", statusEn = "Good vegetation";
  if (ndvi < 0.2)       { statusClass = "status-poor"; statusText = "🔴 STRESSED"; statusEn = "Stressed — needs attention"; }
  else if (ndvi < 0.35) { statusClass = "status-mod";  statusText = "🟡 MODERATE"; statusEn = "Moderate vegetation"; }

  // Trend bars
  const trend = d.trend || {};
  const trendYears = [2019,2020,2021,2022,2023,2024];
  const trendVals = trendYears.map(y => trend[y] || 0);
  const maxT = Math.max(...trendVals, 0.01);
  const trendBars = trendYears.map((y,i) => {
    const v = trendVals[i];
    const pct = Math.round((v/maxT)*100);
    const clr = v > 0.16 ? "#16a34a" : v > 0.13 ? "#d97706" : "#dc2626";
    return `<div class="trend-bar-wrap">
      <div class="trend-bar" style="height:${pct}%;background:${clr};"></div>
      <div class="trend-year">${y}</div>
    </div>`;
  }).join("");

  // Actions
  const actions = [];
  if (water < -0.15)
    actions.push(`<div class="action-item act-urgent">🚨 <b>${T("urgent")}:</b> Irrigate within 3–5 days. Apply 50–70mm water — drip or furrow. Start early morning. Est. cost: 800–1,200 AFN/jereb.</div>`);
  else if (water < -0.05)
    actions.push(`<div class="action-item act-warn">⚠️ <b>${T("important")}:</b> Water level moderate. Monitor daily and irrigate within 7–10 days.</div>`);
  if (ndvi < 0.25)
    actions.push(`<div class="action-item act-urgent">🚨 <b>${T("urgent")}:</b> Severe stress detected. Check for pest or disease. Apply foliar spray if needed.</div>`);
  actions.push(`<div class="action-item act-ok">✅ <b>${T("recommended")}:</b> Add 2–3 tonnes compost/jereb before next season. Reduces fertilizer cost 30%.</div>`);

  // Best crops
  const crops = water < -0.15
    ? ["🌸 Saffron","🌾 Flax","🫘 Chickpeas"]
    : rain < 200
    ? ["🌾 Flax","🌿 Cumin","🫘 Lentils"]
    : ["🌾 Wheat","🥕 Vegetables","🌸 Saffron"];

  // Source badge
  const srcBadge = d.source === "gee_live"
    ? `<span style="color:#16a34a;font-size:.72rem">✅ ${T("source_live")}</span>`
    : `<span style="color:#d97706;font-size:.72rem">📊 ${T("source_reg")}</span>`;

  const html = `
    <div style="font-weight:700;font-size:.95rem;color:var(--green-dark);margin-bottom:8px;display:flex;align-items:center;gap:8px;">
      <span style="width:12px;height:12px;border-radius:50%;background:${field.color};display:inline-block;"></span>
      ${field.label} ${srcBadge}
    </div>
    <span class="status-badge ${statusClass}">${statusText}</span>
    <div id="mini-map"></div>
    <div class="metric-grid">
      <div class="metric-card">
        <div class="mc-val" style="color:${ndvi>0.35?'var(--green)':ndvi>0.2?'var(--amber)':'var(--red)'}">${ndvi.toFixed(3)}</div>
        <div class="mc-lbl">${T("vegetation")} NDVI</div>
      </div>
      <div class="metric-card">
        <div class="mc-val" style="color:${water>-0.1?'var(--blue)':'var(--red)'}">${water.toFixed(3)}</div>
        <div class="mc-lbl">${T("water_idx")}</div>
      </div>
      <div class="metric-card">
        <div class="mc-val">${rain ? Math.round(rain)+'mm' : '—'}</div>
        <div class="mc-lbl">${T("rainfall")}/year</div>
      </div>
      <div class="metric-card">
        <div class="mc-val">${areaJ} J / ${areaHa}ha</div>
        <div class="mc-lbl">${T("field_size")}</div>
      </div>
    </div>
    <div style="font-size:.78rem;color:var(--muted);margin-bottom:4px">${T("data_date")}: ${d.latest_date||'2024'} · ${d.province||'Afghanistan'}</div>
    <div style="font-size:.82rem;font-weight:700;color:var(--green-dark);margin:8px 0 4px">${T("ndvi_trend")}</div>
    <div class="trend-bars">${trendBars}</div>
    <div style="font-size:.82rem;font-weight:700;color:var(--green-dark);margin:10px 0 4px">${T("actions")}</div>
    <div class="actions-list">${actions.join("")}</div>
    <div style="font-size:.82rem;font-weight:700;color:var(--green-dark);margin:8px 0 4px">${T("best_crops")}</div>
    <div class="crops-row">${crops.map(c=>`<span class="crop-chip">${c}</span>`).join("")}</div>
  `;

  document.getElementById("report-content").innerHTML = html;

  // Render mini-map of the drawn field
  if (miniMap) { miniMap.remove(); miniMap = null; }
  setTimeout(() => {
    const el = document.getElementById("mini-map");
    if (!el) return;
    miniMap = L.map("mini-map", { zoomControl: false, dragging: false, scrollWheelZoom: false, doubleClickZoom: false, boxZoom: false, keyboard: false, attributionControl: false });
    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}").addTo(miniMap);
    const poly = L.polygon(field.coords, {
      color: field.color, weight: 3, fillOpacity: 0.35
    }).addTo(miniMap);
    // NDVI colour overlay
    const ndviColor = ndvi > 0.45 ? "rgba(26,154,80,.45)" : ndvi > 0.3 ? "rgba(145,207,96,.45)" : ndvi > 0.15 ? "rgba(254,224,139,.45)" : "rgba(215,48,39,.45)";
    L.polygon(field.coords, { color:"transparent", fillColor: ndviColor, fillOpacity: 0.5 }).addTo(miniMap);
    miniMap.fitBounds(poly.getBounds(), { padding: [10,10] });
  }, 50);
}

function updateReport(field) {
  document.getElementById("report-content").innerHTML = `
    <div class="report-placeholder">
      <div class="ph-icon">🛰️</div>
      <div>${T("report_hint")}</div>
    </div>`;
  if (miniMap) { miniMap.remove(); miniMap = null; }
}

// ════════════════════════════════════════════════════════════
// FIELDS LIST UI
// ════════════════════════════════════════════════════════════
function updateFieldsList() {
  const el = document.getElementById("fields-list");
  if (fields.length === 0) {
    el.innerHTML = `<div class="report-placeholder"><div class="ph-icon">✏️</div><div>${T("draw_hint")}</div></div>`;
    return;
  }
  el.innerHTML = fields.map(f => {
    const ndvi = f.data ? parseFloat(f.data.ndvi) : null;
    const ndviText = ndvi !== null ? ndvi.toFixed(3) : "…";
    const ndviClass = ndvi === null ? "" : ndvi > 0.35 ? "ndvi-good" : ndvi > 0.2 ? "ndvi-mod" : "ndvi-poor";
    const ha = f.data ? parseFloat(f.data.area_ha).toFixed(2) : "?";
    const j  = f.data ? parseFloat(f.data.area_jereb).toFixed(1) : "?";
    return `<div class="field-item${f.id===activeFieldId?' active':''}" data-id="${f.id}" onclick="selectField(${f.id})">
      <div class="fi-name"><span style="width:10px;height:10px;border-radius:50%;background:${f.color};display:inline-block"></span>${f.label}</div>
      <div class="fi-meta">${j}J · ${ha}ha${f.data ? ' · '+f.data.province : ''}</div>
      ${ndvi !== null ? `<div class="fi-ndvi ${ndviClass}">${ndviText}</div>` : `<div class="fi-ndvi" style="background:#f3f4f6;color:#9ca3af">?</div>`}
      <button class="field-del" onclick="event.stopPropagation();deleteField(${f.id})">✕</button>
    </div>`;
  }).join("");
}

function updateNDVIBadge(field) {
  updateFieldsList();
}

function deleteField(id) {
  const idx = fields.findIndex(f => f.id === id);
  if (idx === -1) return;
  if (fields[idx].layer) map.removeLayer(fields[idx].layer);
  fields.splice(idx, 1);
  if (activeFieldId === id) { activeFieldId = null; updateReport(null); }
  updateFieldCount();
  updateFieldsList();
  updateComparison();
}

function updateFieldCount() {
  document.getElementById("field-count").innerHTML = `${fields.length} <span data-t="fields">${T("fields")}</span>`;
}

// ════════════════════════════════════════════════════════════
// COMPARISON TABLE
// ════════════════════════════════════════════════════════════
function updateComparison() {
  const panel = document.getElementById("compare-panel");
  const analysed = fields.filter(f => f.data);
  if (analysed.length < 2) { panel.style.display = "none"; return; }
  panel.style.display = "block";
  const tbody = document.getElementById("compare-body");
  tbody.innerHTML = analysed.map(f => {
    const d = f.data;
    const ndvi = parseFloat(d.ndvi);
    const clr = ndvi > 0.35 ? "#16a34a" : ndvi > 0.2 ? "#d97706" : "#dc2626";
    const sts = ndvi > 0.35 ? "🟢 Good" : ndvi > 0.2 ? "🟡 Mod." : "🔴 Stressed";
    return `<tr>
      <td><span style="color:${f.color}">●</span> ${f.label}</td>
      <td style="color:${clr};font-weight:700">${ndvi.toFixed(3)}</td>
      <td style="color:${parseFloat(d.water)>-0.1?'#0284c7':'#dc2626'}">${parseFloat(d.water).toFixed(3)}</td>
      <td>${parseFloat(d.area_ha).toFixed(2)}</td>
      <td>${sts}</td>
    </tr>`;
  }).join("");
}

// ════════════════════════════════════════════════════════════
// AI CHAT
// ════════════════════════════════════════════════════════════
async function sendQuestion() {
  const input = document.getElementById("ai-input");
  const q = input.value.trim();
  if (!q) return;
  input.value = "";
  addMsg(q, "user");

  // Build field context — all analysed fields
  const fieldData = fields.filter(f => f.data).map(f => ({
    label: f.label, ...f.data
  }));
  if (fieldData.length === 0) {
    addMsg(lang==="fa"?"لطفاً اول زمین رسم کنید و تحلیل کنید" : lang==="ps"?"لومړی ځمکه رسم کړه او تحلیل یې کړه" : "Please draw and analyse a field first.", "ai");
    return;
  }

  addMsg("…", "ai", "thinking");
  try {
    const res = await fetch(`${API}/ask`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, language: lang, field_data: fieldData })
    });
    const data = await res.json();
    const thinking = document.getElementById("thinking");
    if (thinking) thinking.remove();
    if (data.answer) {
      addMsg(data.answer, "ai");
      if (window.speechSynthesis) {
        const u = new SpeechSynthesisUtterance(data.answer);
        u.lang = lang === "fa" ? "fa-AF" : lang === "ps" ? "ps-AF" : "en-US";
        speechSynthesis.speak(u);
      }
    } else {
      addMsg(data.error || "AI not available", "ai");
    }
  } catch (e) {
    const t = document.getElementById("thinking");
    if (t) t.remove();
    addMsg(lang==="fa"?"خطا در اتصال" : lang==="ps"?"د اتصال خطا" : "Connection error — check internet", "ai");
  }
}

function addMsg(text, role, id) {
  const box = document.getElementById("ai-messages");
  const div = document.createElement("div");
  div.className = `msg msg-${role}`;
  if (id) div.id = id;
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function askQuick(q) {
  document.getElementById("ai-input").value = q;
  sendQuestion();
}

// ════════════════════════════════════════════════════════════
// VOICE
// ════════════════════════════════════════════════════════════
function toggleVoice() {
  if (!("webkitSpeechRecognition" in window || "SpeechRecognition" in window)) {
    showToast("Voice not supported in this browser"); return;
  }
  if (isListening) { recognition && recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SR();
  recognition.lang = lang === "fa" ? "fa-AF" : lang === "ps" ? "ps-AF" : "en-US";
  recognition.onstart = () => { isListening = true; document.getElementById("mic-btn").classList.add("listening"); };
  recognition.onend   = () => { isListening = false; document.getElementById("mic-btn").classList.remove("listening"); };
  recognition.onresult = e => {
    document.getElementById("ai-input").value = e.results[0][0].transcript;
    sendQuestion();
  };
  recognition.start();
}

// ════════════════════════════════════════════════════════════
// LANGUAGE
// ════════════════════════════════════════════════════════════
function T(key) { return (TRANS[lang] || TRANS.en)[key] || key; }

function setLang(l) {
  lang = l;
  document.querySelectorAll(".lang-btns button").forEach(b => {
    b.classList.toggle("active", b.textContent.trim() === (l==="en"?"EN":l==="fa"?"دری":"پښتو"));
  });
  document.documentElement.dir = l === "en" ? "ltr" : "rtl";
  // Update all data-t elements
  document.querySelectorAll("[data-t]").forEach(el => {
    const v = T(el.dataset.t);
    if (v) el.textContent = v;
  });
  // Update quick reply buttons
  renderQuickBtns();
  // Re-render current report if any
  const active = fields.find(f => f.id === activeFieldId);
  if (active && active.data) renderReport(active);
  updateFieldsList();
}

function renderQuickBtns() {
  const qs = T("quick");
  document.getElementById("quick-btns").innerHTML = Array.isArray(qs)
    ? qs.map(q => `<button class="quick-btn" onclick="askQuick('${q}')">${q}</button>`).join("")
    : "";
}

// ════════════════════════════════════════════════════════════
// LOADING / TOAST
// ════════════════════════════════════════════════════════════
function showLoading(show) {
  document.getElementById("loading").classList.toggle("show", show);
  if (show) document.getElementById("loading-text").textContent = T("loading");
}

function showToast(msg) {
  const t = document.createElement("div");
  t.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:9px 18px;border-radius:8px;z-index:9998;font-size:.85rem;box-shadow:0 4px 12px rgba(0,0,0,.3)";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ════════════════════════════════════════════════════════════
// CHECK API STATUS
// ════════════════════════════════════════════════════════════
async function checkAPIStatus() {
  const el = document.getElementById("ai-status");
  try {
    const r = await fetch(`${API}/health`, { signal: AbortSignal.timeout(8000) });
    const d = await r.json();
    if (d.gee && d.ai !== "none") {
      el.textContent = `✅ GEE + ${d.ai}`;
      el.style.color = "#16a34a";
    } else if (d.gee) {
      el.textContent = "✅ GEE · ⚠️ AI limited";
      el.style.color = "#d97706";
    } else {
      el.textContent = "⚠️ Regional data only";
      el.style.color = "#d97706";
    }
  } catch (e) {
    el.textContent = "🔴 API offline — using estimates";
    el.style.color = "#dc2626";
  }
}

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
renderQuickBtns();
checkAPIStatus();
setInterval(checkAPIStatus, 60000);
</script>
